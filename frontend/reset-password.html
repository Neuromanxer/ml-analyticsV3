<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e6f7ff 0%, #b3e5fc 100%);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 3rem;
      box-shadow: 0 20px 40px rgba(0, 102, 204, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 400px;
      width: 100%;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #0066cc;
      text-decoration: none;
      background: linear-gradient(45deg, #0066cc, #0099ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
      margin-bottom: 1rem;
      display: block;
    }

    h2 {
      color: #333;
      font-weight: 600;
      font-size: 24px;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-bottom: 2rem;
      font-weight: 400;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .input-group {
      position: relative;
    }

    input {
      width: 100%;
      padding: 1rem 1.2rem;
      font-size: 16px;
      border: 2px solid #e1e8ed;
      border-radius: 12px;
      background: #fff;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      font-weight: 400;
    }

    input:focus {
      outline: none;
      border-color: #0066cc;
      box-shadow: 0 0 0 4px rgba(0, 102, 204, 0.1);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: #999;
      font-weight: 400;
    }

    button {
      padding: 1rem 2rem;
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(45deg, #0066cc, #0099ff);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
      position: relative;
      overflow: hidden;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 102, 204, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    #reset-password-message {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 10px;
      text-align: center;
      font-weight: 500;
      animation: fadeIn 0.3s ease-out;
      min-height: 0;
      transition: all 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .success {
      background: linear-gradient(45deg, #e8f5e8, #d4edda);
      border: 1px solid #c3e6cb;
      color: #155724;
    }

    .error {
      background: linear-gradient(45deg, #f8e6e7, #f5c6cb);
      border: 1px solid #f1b0b7;
      color: #721c24;
    }

    .loading {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #fff;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .security-info {
      background: rgba(0, 102, 204, 0.05);
      border: 1px solid rgba(0, 102, 204, 0.1);
      border-radius: 10px;
      padding: 1rem;
      margin-top: 1.5rem;
      color: #0066cc;
      font-size: 13px;
      text-align: center;
    }

    .password-requirements {
      font-size: 12px;
      color: #666;
      margin-top: 0.5rem;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.5rem;
        margin: 1rem;
      }
      
      .logo {
        font-size: 24px;
      }
      
      h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">SecureApp</a>
    <h2>Reset Your Password</h2>
    <p class="subtitle">Enter your new password below</p>
    
    <form id="reset-password-form">
      <div class="input-group">
        <input type="password" id="new-password" placeholder="Enter new password" required />
        <div class="password-requirements">
          Password should be at least 8 characters long
        </div>
      </div>
      <button type="submit" id="submit-btn">
        <span class="btn-text">Reset Password</span>
      </button>
    </form>
    
    <div id="reset-password-message"></div>
    
    <div class="security-info">
      🔒 Your password will be securely encrypted and stored
    </div>
  </div>

  <script>
    // Replace with your backend URL
    const API_BASE_URL = 'https://ml-insights-backend.onrender.com';
    // const API_BASE_URL = 'http://127.0.0.1:8000';
    function setupResetPasswordHandler() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const form = document.getElementById('reset-password-form');
      const messageDiv = document.getElementById('reset-password-message');
      const submitBtn = document.getElementById('submit-btn');
      const btnText = submitBtn.querySelector('.btn-text');
      
      if (!form || !messageDiv) return;
      
      if (!token) {
        messageDiv.innerHTML = "❌ Missing or invalid reset token.";
        messageDiv.className = "error";
        form.style.display = "none";
        return;
      }
      
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        
        const newPassword = document.getElementById('new-password').value;
        
        if (newPassword.length < 8) {
          showMessage("❌ Password must be at least 8 characters long.", "error");
          return;
        }
        
        // Show loading state
        submitBtn.disabled = true;
        btnText.innerHTML = '<div class="loading"><div class="spinner"></div>Resetting...</div>';
        
        try {
          const response = await fetch(`${API_BASE_URL}/api/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reset_token: token, new_password: newPassword })
          });
          
          const data = await response.json();
          
          if (!response.ok) {
            throw new Error(data.detail || "Password reset failed.");
          }
          
          showMessage("✅ Password reset successful! Redirecting to login...", "success");
          form.style.display = "none";
          
          setTimeout(() => {
            window.location.href = "/login"; // Adjust path as needed
          }, 2000);
          
        } catch (err) {
          console.error(err);
          showMessage(`❌ ${err.message}`, "error");
          
          // Reset button state
          submitBtn.disabled = false;
          btnText.innerHTML = 'Reset Password';
        }
      });
      
      function showMessage(message, type) {
        messageDiv.innerHTML = message;
        messageDiv.className = type;
      }
    }
    
    document.addEventListener('DOMContentLoaded', setupResetPasswordHandler);
  </script>
</body>
</html>
